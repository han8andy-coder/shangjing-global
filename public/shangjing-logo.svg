<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="badge-bg" cx="38%" cy="32%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1c2d4a"/>
      <stop offset="60%" stop-color="#0d1b30"/>
      <stop offset="100%" stop-color="#060e1c"/>
    </radialGradient>
    <linearGradient id="gold-up" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#845f20"/>
      <stop offset="50%" stop-color="#d9a33a"/>
      <stop offset="100%" stop-color="#f5d170"/>
    </linearGradient>
    <linearGradient id="gold-diag" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#845f20"/>
      <stop offset="50%" stop-color="#d9a33a"/>
      <stop offset="100%" stop-color="#f5d170"/>
    </linearGradient>
    <linearGradient id="text-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d170"/>
      <stop offset="55%" stop-color="#d9a33a"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>
    <linearGradient id="ring-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d170"/>
      <stop offset="50%" stop-color="#d9a33a"/>
      <stop offset="100%" stop-color="#6e4f18"/>
    </linearGradient>
    <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="star-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo -->
  <circle cx="240" cy="240" r="230" fill="rgba(217,163,58,0.05)"/>

  <!-- Badge background -->
  <circle cx="240" cy="240" r="212" fill="url(#badge-bg)"/>

  <!-- Outer gold ring -->
  <circle cx="240" cy="240" r="210" fill="none" stroke="url(#ring-gold)" stroke-width="5"/>
  <!-- Inner accent ring -->
  <circle cx="240" cy="240" r="196" fill="none" stroke="rgba(240,201,107,0.2)" stroke-width="1.5"/>

  <!-- Top-left highlight arc -->
  <path d="M 98 158 A 152 152 0 0 1 208 95" stroke="rgba(255,255,255,0.15)" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Bar 1 (short) -->
  <rect x="152" y="320" width="40" height="78" rx="5" fill="url(#gold-up)" opacity="0.88" filter="url(#glow-sm)"/>
  <!-- Bar 2 (medium) -->
  <rect x="208" y="268" width="40" height="130" rx="5" fill="url(#gold-up)" filter="url(#glow-sm)"/>
  <!-- Bar 3 (tall) -->
  <rect x="264" y="206" width="40" height="192" rx="5" fill="url(#gold-up)" filter="url(#glow-sm)"/>

  <!-- Diagonal growth slash -->
  <line x1="140" y1="386" x2="326" y2="170" stroke="url(#gold-diag)" stroke-width="5.5" stroke-linecap="round" filter="url(#glow-sm)"/>

  <!-- Sparkle at top of slash -->
  <g filter="url(#star-glow)">
    <circle cx="326" cy="170" r="5" fill="#fdeea0"/>
    <line x1="326" y1="156" x2="326" y2="184" stroke="#fdeea0" stroke-width="2" stroke-linecap="round"/>
    <line x1="312" y1="170" x2="340" y2="170" stroke="#fdeea0" stroke-width="2" stroke-linecap="round"/>
    <line x1="316" y1="160" x2="336" y2="180" stroke="#fdeea0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="316" y1="180" x2="336" y2="160" stroke="#fdeea0" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Brand name -->
  <text
    x="488" y="228"
    font-size="136"
    font-weight="900"
    font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, sans-serif"
    fill="url(#text-gold)"
  >商镜 Global</text>

  <!-- Rule line -->
  <line x1="490" y1="252" x2="1540" y2="252" stroke="url(#ring-gold)" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text
    x="496" y="320"
    font-size="46"
    font-weight="600"
    font-family="Georgia, 'Times New Roman', serif"
    fill="#8ea3b8"
    letter-spacing="8"
  >BUSINESS MIRROR GLOBAL</text>
</svg>
