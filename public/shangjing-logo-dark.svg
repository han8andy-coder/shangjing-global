<svg width="1600" height="480" viewBox="0 0 1600 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icon-gold" x1="90" y1="80" x2="430" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5d170"/>
      <stop offset="0.5" stop-color="#d9a33a"/>
      <stop offset="1" stop-color="#845f20"/>
    </linearGradient>
    <linearGradient id="text-gold-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d170"/>
      <stop offset="60%" stop-color="#d9a33a"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>
    <linearGradient id="sub-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9a33a"/>
      <stop offset="100%" stop-color="#7a5415"/>
    </linearGradient>
    <filter id="icon-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#d9a33a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Rounded square icon -->
  <rect x="60" y="60" width="360" height="360" rx="80" fill="url(#icon-gold)" filter="url(#icon-shadow)"/>

  <!-- Gloss overlay (top-left shine) -->
  <path d="M 100 80 L 290 68 L 170 250 L 90 250 Z" fill="white" opacity="0.12"/>

  <!-- Dark "镜" character inside -->
  <text
    x="240" y="318"
    text-anchor="middle"
    font-size="218"
    font-weight="900"
    font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, sans-serif"
    fill="#0d1520"
    opacity="0.88"
  >镜</text>

  <!-- Brand name -->
  <text
    x="488" y="226"
    font-size="134"
    font-weight="900"
    font-family="Noto Sans CJK SC, Microsoft YaHei, PingFang SC, sans-serif"
    fill="url(#text-gold-d)"
  >商镜 Global</text>

  <!-- Rule -->
  <line x1="490" y1="250" x2="1540" y2="250" stroke="url(#sub-gold)" stroke-width="1" opacity="0.35"/>

  <!-- Subtitle -->
  <text
    x="496" y="318"
    font-size="46"
    font-weight="600"
    font-family="Georgia, 'Times New Roman', serif"
    fill="url(#sub-gold)"
    letter-spacing="8"
    opacity="0.82"
  >BUSINESS MIRROR GLOBAL</text>
</svg>
